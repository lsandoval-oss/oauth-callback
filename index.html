<!DOCTYPE html>
<html>
<head>
<title>Redirigiendo...</title>
<meta charset="utf-8">
</head>
<body>
<p id="msg">Redirigiendo a la aplicacion...</p>
<script>
var p = new URLSearchParams(window.location.search);
var s = p.get('state');
var c = p.get('code');
if (s && c) {
    window.location.href = s + '?code=' + encodeURIComponent(c);
} else {
    document.getElementById('msg').innerText = 'Faltan parametros';
}
</script>
</body>
</html>
