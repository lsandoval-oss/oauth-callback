<!DOCTYPE html>
<html>
<head><title>Redirigiendo...</title></head>
<body>
<p id="msg">Redirigiendo a la aplicacion...</p>
<script>
var params = new URLSearchParams(window.location.search);
var state = params.get('state');
var code = params.get('code');
if (state && code) {
    var url = state + '?code=' + encodeURIComponent(code);
    var scope = params.get('scope');
    if (scope) url += '&scope=' + encodeURIComponent(scope);
    
    // Intentar multiples metodos de redireccion
    window.location.href = url;
    
    // Fallback con enlace manual
    setTimeout(function() {
        document.getElementById('msg').innerHTML = 
            '<b>Si no se abrio la app automaticamente:</b><br><br>' +
            '<a href="' + url + '" style="font-size:20px;color:blue;">Toca aqui para abrir la app</a>';
    }, 2000);
} else {
    document.getElementById('msg').innerText = 'Error - URL: ' + window.location.href;
}
</script>
</body>
</html>
